<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#12121f"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0.5" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-width="1"/>
    <line x1="0" y1="340" x2="512" y2="340" stroke="white" stroke-width="1"/>
    <line x1="170" y1="0" x2="170" y2="512" stroke="white" stroke-width="1"/>
    <line x1="340" y1="0" x2="340" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Moon glow -->
  <ellipse cx="256" cy="240" rx="120" ry="140" fill="url(#glow)"/>

  <!-- Moon crescent (main shape) -->
  <path d="M 290 120
           A 100 100 0 1 1 290 360
           A 80 90 0 1 0 290 120 Z"
        fill="url(#moon)" opacity="0.95"/>

  <!-- Glass reflection on moon -->
  <path d="M 270 140
           A 85 85 0 1 1 270 340
           A 68 78 0 1 0 270 140 Z"
        fill="white" opacity="0.08"/>

  <!-- Journal lines (3 dots suggesting writing) -->
  <circle cx="220" cy="230" r="5" fill="white" opacity="0.6"/>
  <circle cx="220" cy="250" r="5" fill="white" opacity="0.4"/>
  <circle cx="220" cy="270" r="5" fill="white" opacity="0.2"/>

  <!-- Journal lines (writing lines) -->
  <line x1="235" y1="230" x2="270" y2="230" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="235" y1="250" x2="260" y2="250" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="235" y1="270" x2="250" y2="270" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.08"/>

  <!-- Top-right star accent -->
  <circle cx="340" cy="140" r="2.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="320" cy="120" r="1.5" fill="#a78bfa" opacity="0.3"/>
</svg>
