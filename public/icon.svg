<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Vibrant background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

  <!-- Crescent moon -->
  <g transform="translate(256, 236)" filter="url(#glow)">
    <path d="M 0 -110
             A 100 100 0 1 1 0 110
             A 80 85 0 1 0 0 -110 Z"
          fill="url(#moonGrad)" opacity="0.95"/>
  </g>

  <!-- Stars -->
  <circle cx="150" cy="130" r="5" fill="white" opacity="0.9"/>
  <circle cx="360" cy="160" r="3" fill="white" opacity="0.7"/>
  <circle cx="340" cy="350" r="4" fill="white" opacity="0.5"/>
  <circle cx="130" cy="370" r="2.5" fill="white" opacity="0.6"/>

  <!-- Tiny sparkles -->
  <circle cx="180" cy="100" r="2" fill="white" opacity="0.4"/>
  <circle cx="380" cy="280" r="2" fill="white" opacity="0.3"/>
</svg>
